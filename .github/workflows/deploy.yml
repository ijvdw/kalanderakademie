name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx ng build --configuration production --base-href=/kalanderakademie/
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/kalander/browser
          branch: gh-pages
