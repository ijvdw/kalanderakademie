<header>
  <div class="container header-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">
      <picture>
        <source srcset="assets/logo.webp" type="image/webp" />
        <img src="assets/logo.jpg" alt="Kalander" />
      </picture>
    </a>
    <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <nav [class.open]="isMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a>
      <a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a>
      <a routerLink="/services" routerLinkActive="active" (click)="closeMenu()">Services</a>
      <a routerLink="/schedule" routerLinkActive="active" (click)="closeMenu()">Schedule</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="closeMenu()">Contact</a>
    </nav>
  </div>
</header>
